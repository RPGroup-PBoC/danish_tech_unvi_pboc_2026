    - time: "12:00pm–1:00pm"
      activity: "Lunch"
    - time: "1:00pm–2:00pm"
      activity: >
        Research talk from course faculty and invited guests on their research in quantitative biology.
        We aim for these talks to be of high pedagogical value, so interruptions and questions are encouraged!
    - time: "2:00pm–2:30pm"
      activity: >
        Breakout session between the students and the speaker.
        These sessions are perfect venues to ask follow up questions about the talk,
        but also to learn about the speaker’s career path.
    - time: "2:30pm–5:30pm"
      activity: "More lectures, hands-on activities, and copious amounts of coffee."
    - time: "5:30pm–6:00pm"
      activity: "Time to work on estimates for final presentation."
