Before class:
  - title: "Physical Biology of the Cell, 2nd Edition"
    authors: "Phillips, R. et al."
    year: 2012
    description: >
      Our course will be loosely based on this textbook. Note that we are actively working
      on the 3rd edition and may share draft chapters as we visit topics in lecture.

  - title: "A Student’s Guide to Python for Physical Modeling: Updated Edition"
    authors: "Kinder, J. and Nelson, P."
    year: 2018
    description: "A great introduction to programming in Python; useful throughout the course."

  - title: "Molecular Biology of the Cell"
    authors: "Alberts, B. et al."
    year: 2014
    description: "Useful refresher for core cell biology."

  - title: "Cell Biology by the Numbers"
    authors: "Milo, R. and Phillips, R."
    year: 2015
    description: >
      A reference source for biological numeracy. Companion site: book.bionumbers.org.

  - title: "Street-Fighting Mathematics: The Art of Educated Guessing and Opportunistic Problem Solving"
    authors: "Mahajan, S."
    year: 2010
    description: "Fantastic resource for estimation and approximation."

  - title: "Guesstimation: Solving the World’s Problems on the Back of a Cocktail Napkin"
    authors: "Weinstein, L. and Adam, J. A."
    year: 2008
    description: "More estimation practice and philosophy."

Day 1 - To read:
  - title: What is the total number of protein molecules per cell volume? A call to rethink some published values
    authors: Ron Milo
    year: 2013
    link: milo2013.pdf
    description: >
      This paper is one of the most systematic places to examine the question of how many proteins are found per micron cubed of cytoplasmic material. Ron’s table 1 summarizes the situation for a number of different cell types across the tree of life.

  - title: The quantitative and condition-dependent *Escherichia coli* proteome
    authors: Alexander Schmidt, Karl Kochanowski, Silke Vedelaar, Erik Ahrné, Benjamin Volkmer, Luciano Callipo, Kèvin Knoops, Manuel Bauer, Ruedi Aebersold, and Matthias Heinemann
    year: 2016
    link: schmidt2016.pdf
    description: >
      This paper describes a mass spectrometry study of the protein contents of *E. coli* for 22 different growth conditions. Their results are a gold-standard to compare our estimates of the cell as a bag of proteins to.

  - title: Fundamental limits on the rate of bacterial growth and their influence on proteomic composition
    authors: Nathan M. Belliveau, Griffin Chure, Christina L. Hueschen, Hernan G. Garcia, Jane Kondev, Daniel S. Fisher, Julie A. Theriot, and Rob Phillips
    year: 2021
    link: belliveau2021.pdf
    description: >
      This paper brings together proteomic studies of *E. coli* from a number of different sources and attempts to carefully unify the data under many growth conditions with simple estimates like those to be carried out in class.   
Day 1 - Mentioned in Class:
  - title: Duration of urination does not change with body size
    authors: Patricia J. Yang, Jonathan Pham, Jerome Choo, and David L. Hu
    year: 2014
    link: Yang2014.pdf
    description: >
        Mammals heavier than ~3 kg have an approximately constant urination time (~21 ± 13 s):
        flow rate is gravity-dominated so T ≈ V/Q. For smaller mammals, capillary and viscous forces complicate the scaling.

  - title: On Biomolecular Layers of lipoids on the Chromocytes of the Blood
    authors: E. Gorter, F. Grendel.
    year: 1924
    link: Gorter1924.pdf
    description: >
        Found the height of biolayers of red blood cells and lipids.
