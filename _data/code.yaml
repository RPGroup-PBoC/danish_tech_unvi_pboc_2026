Tutorials:
  - script: 
    title: Tutorial 0.0 -- A Primer On Jupyter Notebooks and Google Colab
    colab: "https://colab.research.google.com/drive/1uqIm6CJ2FcbYsJ29lCwOefdn-6Nyc5ch?usp=sharing"
    description: >
      This tutorial expalins what a Jupyter Notebook is and how to use it on Google Colab
  - script: 
    title: Tutorial 0.1 -- A Primer On Python Syntax
    colab: "https://colab.research.google.com/drive/1Jvi1pCsQ2yjmSwcNRp1K3YsG_DDvcKEA?usp=sharing"
    description: >
      This tutorial gives a quick intro to programming in Python. 


Exercises:
  - script: 
    title: "Day 2 -- Tutorial 1: Update rules applied for exponential growth and constitutive expression"
    colab: "https://colab.research.google.com/drive/1b-w-oX_xzKhEcrFw8JJTxVv_biq2EB-n?usp=sharing"
    description: >  
      In this exercise, we learn apply the simplest numerical scheme to integrate an ordinary differential equation.

  - script:
    title: "Day 2 -- Tutorial 2: Dynamics and Stochasticity of Constitutive Expression"
    colab: "https://colab.research.google.com/drive/15bx0PGX5IoAtAAyUYwoWtvD5E4nuXWLR?usp=sharing"
    description: >
      In this exercise, we use a chemical master equation to dissect dynamics 
      of constitutive expression.

  - script:
    title: "Day 3 -- Tutorial 3: A random walker diffusing away"
    colab: "https://colab.research.google.com/drive/1Py-T130ujMHWHBmeutIc-aS-FjuLrSWZ?usp=sharing"
    description: >
      In this exercise, we write master equations for a random walk, giving rise to diffusion.

  - script:
    title: "Day 4 -- Tutorial 4: The theory of least mean square"
    colab: "https://colab.research.google.com/drive/1zkVEFl_4YSjCwCyTqHT6hn0QVw_kICFq?usp=sharing"
    description: >
      Doing a regression on a desert island (nearly).

  - script:
    title: "Day 4 -- Tutorial 5: Principle component analysis of a mystery dataset"
    colab: "https://colab.research.google.com/drive/154fWTDDTBYVvAN67TMzxXO_ZxUssOjyO?usp=sharing"
    description: >
      In this exercise, we find the 'natural coordinates' of a dataset.
    data: trajectory.txt

  - script:
    title: "Day 5-- Tutorial 6: The danse of the worm"
    colab: "https://colab.research.google.com/drive/1SJXJ_jngXkRcHR6Jl5FwbpoTF-d0LZOg?usp=sharing"
    description: >
      In this exercise, we will break down the danse of the worm in a couple of its favorite steps. For this we will apply principal component ananlysis to its movement as a function of times.

  - script:
    title: "Day 6-- Tutorial 7: The ion channel"
    colab: "https://colab.research.google.com/drive/1JUjbK1vJFBvZjWtJwshTuEFHg3f4GKIw?usp=sharing"
    description: >
      In this exercise, we will derive the probability of an ion channel being open and closed, through data and through statistical mechanics.
    data: Keller1986Interpolated.xls

  - script:
    title: "Day 6-- Tutorial 8: Cefalic Furrow"
    colab: "https://colab.research.google.com/drive/1yyQrUDaI3gDAUwiUafotpMLyv30F61x8?usp=sharing"
    description: >
      In this exercise, we will look at the position of the Cefalic Furrow as a function of the Bicoid dosage in different mutants.

